apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app.kubernetes.io/name: oumi
  app.kubernetes.io/part-of: oumi-platform

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - pvc.yaml

images:
  - name: oumi
    newName: oumi  # Will be overridden
    newTag: latest # Will be overridden